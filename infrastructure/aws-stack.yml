AWSTemplateFormatVersion: '2010-09-09'
Description: Doctor Commerce - S3 + CloudFront + Route 53 static hosting

Parameters:
  DomainName:
    Type: String
    Description: "Root domain (e.g. doctorcommerce.com)"

  CertificateArn:
    Type: String
    Description: "ACM certificate ARN — must be created in us-east-1"

Resources:

  # ─── S3 Bucket ────────────────────────────────────────────────────────────────
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DomainName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── CloudFront Origin Access Control ─────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${DomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ─── S3 Bucket Policy (CloudFront only) ───────────────────────────────────────
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: CloudFrontDistribution
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ─── CloudFront Distribution ───────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        PriceClass: PriceClass_All
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !Sub "www.${DomainName}"
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          # CachingOptimized managed policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # SPA fallback — send 403/404 to index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # ─── Route 53 Hosted Zone ─────────────────────────────────────────────────────
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  # ─── DNS Records ──────────────────────────────────────────────────────────────
  RootAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (always this value)
        EvaluateTargetHealth: false

  WwwAliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  S3BucketName:
    Description: S3 bucket — paste this into GitHub secret AWS_S3_BUCKET
    Value: !Ref WebsiteBucket

  CloudFrontDistributionId:
    Description: CloudFront ID — paste into GitHub secret AWS_CLOUDFRONT_DISTRIBUTION_ID
    Value: !Ref CloudFrontDistribution

  CloudFrontDomain:
    Description: CloudFront URL (before domain connects)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  HostedZoneId:
    Description: Route 53 Hosted Zone ID
    Value: !Ref HostedZone

  NameServers:
    Description: Copy these 4 nameservers to your domain registrar
    Value: !Join [", ", !GetAtt HostedZone.NameServers]
